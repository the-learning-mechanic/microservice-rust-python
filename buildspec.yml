version: 0.2
phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 129898048508.dkr.ecr.us-east-2.amazonaws.com
  build:
    commands:
      - docker build -t myfastapi .
      - docker tag myfastapi:latest 129898048508.dkr.ecr.us-east-2.amazonaws.com/myfastapi:latest
  post_build:
    commands:
      - docker push 129898048508.dkr.ecr.us-east-2.amazonaws.com/myfastapi:latest
